<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pesquisa jurídica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .centraliza {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        button {
            width: 100%;
            background-color: #047baa;
            color: #ffffff;
            border: none;
            padding: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.7;
        }

        .dropdown-menu {
            width: 33%;
            position: relative;
            display: inline-block;
        }

        .dropdown-menu:hover .dropdown-content {
            display: block;
        }

        .dropdown-content {
            width: 100%;
            display: none;
            position: absolute;
            background-color: #f1f1f1;
        }

        .dropdown-content a {
            color: #000000;
            padding: 12px 16px;
            margin: 5px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #047baa;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="centraliza">
        <h1>Pesquisa jurídica</h1>

        <div class="dropdown-menu">
            <button type="button">Escolha o estado</button>

            <div class="dropdown-content">
                <a href="pesquisa_estadual.html?estado=DF" target="_blank">Distrito Federal</a>
                <a href="pesquisa_estadual.html?estado=RJ" target="_blank">Rio de Janeiro</a>
                <a href="pesquisa_estadual.html?estado=SP" target="_blank">São Paulo</a>
            </div>
        </div>
    </div>
</body>
</html>
